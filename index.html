<script>
// ═══════════════════════════════════════════════════════════
//  DATOS DINÁMICOS DESDE GOOGLE SHEETS
// ═══════════════════════════════════════════════════════════
var PRODUCTOS  = [];
var CATEGORIAS = [];

// URL de tu Web App (La que termina en /exec)
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzdRh-HlFqfZKUTCGnFREEZJf7isGZoOogKyVivpAi-2wOjuY9cvxiQXoVfBBpusZg/exec";

async function cargarDatosHojas() {
  try {
    const response = await fetch(WEB_APP_URL + "?action=getDatos");
    const data = await response.json();
    PRODUCTOS = data.productos;
    CATEGORIAS = data.categorias;
    console.log("Inventario sincronizado.");
    if(sucursal) construirModulos();
  } catch (e) {
    console.error("Error al conectar con las hojas:", e);
  }
}

// Iniciar carga al abrir la página
window.onload = cargarDatosHojas;

// ═══════════════════════════════════════════════════════════
//  ESTADO GLOBAL (Lógica de diseño intacta)
// ═══════════════════════════════════════════════════════════
var sucursal     = '';
var carrito      = [];
var tipoPagoSel  = '';
var personalIdx  = 0;
var _datosDir    = {};
var recogerEnTienda = false;
var _galeriasProd = {};
var _galImgs  = [];
var _galIdx   = 0;
var SUC_COORDS = { 'Ecatepec': { lat: 19.6094, lng: -99.0350 }, 'Tecámac':  { lat: 19.7143, lng: -98.9716 } };

function entrarTienda() {
  // Sincronizar stock antes de mostrar
  cargarDatosHojas().then(() => {
    document.getElementById('pantalla-bienvenida').style.display = 'none';
    document.getElementById('tienda').style.display = 'block';
    document.getElementById('hero-suc-txt').textContent = sucursal;
    construirModulos();
    renderCarrito();
  });
}

// IMPORTANTE: Para el envío del pedido, reemplaza la llamada google.script.run en confirmarPedido() por:
// fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify(datos) });
</script>
