<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MAIA_for you — Boutique Flores y Globos</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    :root {
      --viola:    #7b4f8e;
      --viola-dk: #6a3d7a;
      --rosa:     #e8a0b4;
      --gris:     #f4f4f6;
      --texto:    #2c2c2c;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #f3e8f7 0%, #fce8ef 50%, #f0e0f8 100%);
      font-family: 'DM Sans', sans-serif; padding: 1rem;
    }
    body::before, body::after {
      content: ''; position: fixed; border-radius: 50%;
      filter: blur(80px); opacity: .35; pointer-events: none; z-index: 0;
    }
    body::before {
      width: 420px; height: 420px;
      background: radial-gradient(circle, var(--viola) 0%, transparent 70%);
      top: -100px; left: -100px;
    }
    body::after {
      width: 380px; height: 380px;
      background: radial-gradient(circle, var(--rosa) 0%, transparent 70%);
      bottom: -80px; right: -80px;
    }
    .card {
      position: relative; z-index: 1; background: #fff; border-radius: 24px;
      box-shadow: 0 8px 40px rgba(123,79,142,.18);
      max-width: 380px; width: 100%; overflow: hidden;
      animation: slideUp .5s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(28px) scale(.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .card-header {
      background: linear-gradient(135deg, #7b4f8e 0%, #a06fa0 60%, #c8a0c8 100%);
      padding: 28px 24px 22px;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
    }
    .logo-circle {
      width: 72px; height: 72px; border-radius: 50%; overflow: hidden;
      border: 3px solid rgba(255,255,255,.5);
      box-shadow: 0 4px 16px rgba(0,0,0,.2); background: #c8a0c8;
    }
    .logo-circle img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .card-header h1 {
      color: #fff; font-family: 'Playfair Display', serif;
      font-size: 1.3rem; letter-spacing: 2px; margin: 0;
    }
    .card-header p { color: rgba(255,255,255,.88); font-size: .82rem; }
    .card-body { padding: 22px 28px 8px; text-align: center; }
    .card-body h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem; color: var(--texto); line-height: 1.4; margin-bottom: 8px;
    }
    .card-body p { font-size: .82rem; color: #888; line-height: 1.6; }
    /* QR */
    .qr-wrap {
      display: flex; justify-content: center; margin: 16px 0 8px;
    }
    .qr-wrap canvas, .qr-wrap img {
      border-radius: 12px;
      border: 4px solid var(--gris);
      padding: 8px; background: #fff;
    }
    .qr-hint {
      font-size: .75rem; color: #bbb; text-align: center;
      margin-bottom: 4px; font-family: Arial, sans-serif;
    }
    .divider { height: 1px; background: var(--gris); margin: 14px 28px 0; }
    .card-actions { padding: 16px 28px 24px; display: flex; flex-direction: column; gap: 10px; }
    .btn-entrar {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; text-decoration: none; border-radius: 12px; padding: 13px;
      background: linear-gradient(135deg, var(--viola), #c8a0c8);
      color: #fff; font-family: 'DM Sans', sans-serif;
      font-size: .9rem; font-weight: 700;
      box-shadow: 0 4px 16px rgba(123,79,142,.35);
      transition: all .18s ease; border: none; cursor: pointer;
    }
    .btn-entrar:hover { opacity: .9; transform: translateY(-1px); }
    .btn-copy {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      width: 100%; border-radius: 12px; padding: 11px;
      background: var(--gris); color: #666;
      font-family: 'DM Sans', sans-serif; font-size: .85rem; font-weight: 500;
      border: none; cursor: pointer; transition: all .18s ease;
    }
    .btn-copy:hover { background: #e5e5e8; }
    .btn-copy.copiado { background: #e8f5ee; color: #27ae60; }
    .maia-brand {
      text-align: center; padding: 0 0 18px;
      font-size: .72rem; color: #bbb; letter-spacing: .8px; text-transform: uppercase;
    }
    .maia-brand span { color: var(--viola); font-weight: 500; }
  </style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <div class="logo-circle">
      <img src="https://i.postimg.cc/8zL8DB99/MAIA.jpg" alt="MAIA"
           onerror="this.style.display='none'"/>
    </div>
    <h1>MAIA_for you</h1>
    <p>Boutique Flores y Globos 🌸</p>
  </div>

  <div class="card-body">
    <h2>¡Bienvenida a la tienda!</h2>
    <p>Escanea el código QR con tu cámara<br>o toca el botón para entrar.</p>
    <div class="qr-wrap" id="qr"></div>
    <p class="qr-hint">📷 Apunta tu cámara al código</p>
  </div>

  <div class="divider"></div>

  <div class="card-actions">
    <a class="btn-entrar"
       href="https://script.google.com/macros/s/AKfycbybiU5TTvMDNedUC9gev5gh7mmWbZdqGSelDU_gLdypgXr9d5k6olPo1mhCUGqXdcMV/exec"
       target="_blank" rel="noopener">
      🌸 &nbsp;Abrir tienda
    </a>
    <button class="btn-copy" id="btn-copy" onclick="copiarLink()">
      📋 &nbsp;Copiar link de la tienda
    </button>
  </div>

  <div class="maia-brand">Tienda <span>MAIA</span> &nbsp;|&nbsp; 55 7924 8882</div>
</div>

<script>
  var TIENDA = 'https://script.google.com/macros/s/AKfycbybiU5TTvMDNedUC9gev5gh7mmWbZdqGSelDU_gLdypgXr9d5k6olPo1mhCUGqXdcMV/exec';

  // Generar QR automáticamente
  new QRCode(document.getElementById('qr'), {
    text:   TIENDA,
    width:  160,
    height: 160,
    colorDark:  '#4a2c4a',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.M
  });

  function copiarLink() {
    navigator.clipboard.writeText(TIENDA).then(function() {
      var btn = document.getElementById('btn-copy');
      btn.textContent = '✅  ¡Link copiado!';
      btn.classList.add('copiado');
      setTimeout(function() {
        btn.innerHTML = '📋 &nbsp;Copiar link de la tienda';
        btn.classList.remove('copiado');
      }, 2500);
    }).catch(function() {
      prompt('Copia este link:', TIENDA);
    });
  }
</script>
</body>
</html>
