<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MAIA_for you</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;min-height:100vh}
body{
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;padding:20px;
  background:#7b4f8e;
  font-family:Arial,sans-serif;
}
.card{
  background:#fff;border-radius:20px;
  box-shadow:0 8px 32px rgba(0,0,0,.25);
  max-width:340px;width:100%;overflow:hidden;
}
.hdr{
  background:linear-gradient(135deg,#7b4f8e,#c8a0c8);
  padding:30px 20px 20px;text-align:center;
}
.hdr img{
  width:80px;height:80px;border-radius:50%;
  border:3px solid rgba(255,255,255,.6);
  display:block;margin:0 auto 12px;
}
.hdr h1{color:#fff;font-size:20px;letter-spacing:2px;margin-bottom:4px}
.hdr p{color:rgba(255,255,255,.85);font-size:13px}
.body{padding:24px;text-align:center}
.body h2{font-size:17px;color:#4a2c4a;margin-bottom:10px}
.body p{font-size:13px;color:#777;line-height:1.6}
.emojis{font-size:20px;margin-top:8px;letter-spacing:4px}
.actions{padding:0 24px 24px}
.btn{
  display:block;width:100%;padding:14px;
  background:linear-gradient(135deg,#7b4f8e,#c8a0c8);
  color:#fff;border:none;border-radius:12px;
  font-size:15px;font-weight:bold;cursor:pointer;
  text-align:center;text-decoration:none;
  margin-top:12px;
}
.btn:hover{opacity:.9}
.pie{
  text-align:center;padding:0 0 16px;
  font-size:11px;color:#bbb;letter-spacing:.5px;
}
</style>
</head>
<body>
<div class="card">
  <div class="hdr">
    <img src="https://i.postimg.cc/8zL8DB99/MAIA.jpg" alt="MAIA"
         onerror="this.style.background='#c8a0c8'"/>
    <h1>MAIA_for you</h1>
    <p>Boutique Flores y Globos 🌸</p>
  </div>
  <div class="body">
    <h2>¡Bienvenida!</h2>
    <p>Arreglos florales, ramos personalizados<br>y globos para cada ocasión.</p>
    <div class="emojis">🌷 💐 🎈</div>
  </div>
  <div class="actions">
    <a class="btn"
       href="https://script.google.com/macros/s/AKfycbybiU5TTvMDNedUC9gev5gh7mmWbZdqGSelDU_gLdypgXr9d5k6olPo1mhCUGqXdcMV/exec"
       target="_blank"
       rel="noopener noreferrer">
      🌸 Entrar a la tienda
    </a>
  </div>
  <div class="pie">MAIA_for you &nbsp;|&nbsp; 55 7924 8882</div>
</div>
</body>
</html>
