<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAIA_for you — Boutique Flores y Globos</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: linear-gradient(160deg, #4a2c4a 0%, #6e3f6e 40%, #9c6f9c 80%, #c8a0c8 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      flex-direction: column;
      gap: 20px;
      font-family: Georgia, serif;
    }
    img {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      border: 4px solid rgba(255,255,255,.4);
      box-shadow: 0 8px 32px rgba(0,0,0,.3);
      animation: pulse 1.8s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 8px 32px rgba(0,0,0,.3); }
      50%       { transform: scale(1.04); box-shadow: 0 12px 40px rgba(200,160,200,.5); }
    }
    h1 {
      color: #fff;
      font-size: 26px;
      letter-spacing: 4px;
    }
    p {
      color: rgba(255,255,255,.75);
      font-family: Arial, sans-serif;
      font-size: 13px;
      letter-spacing: 1px;
    }
    .dots::after {
      content: '';
      animation: dots 1.5s steps(4, end) infinite;
    }
    @keyframes dots {
      0%   { content: ''; }
      25%  { content: '.'; }
      50%  { content: '..'; }
      75%  { content: '...'; }
      100% { content: ''; }
    }
  </style>
  <script>
    // ── Redirige directo a la tienda en Apps Script ──────────────
    // Reemplaza la URL de abajo con tu URL real de Apps Script
    window.location.replace(
      'https://script.google.com/macros/s/AKfycb.../exec'
    );
  </script>
</head>
<body>
  <img src="https://i.postimg.cc/8zL8DB99/MAIA.jpg" alt="MAIA_for you">
  <h1>MAIA_for you</h1>
  <p>Cargando tu tienda<span class="dots"></span></p>
</body>
</html>
