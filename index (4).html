<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MAIA_for you — Boutique Flores y Globos</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root { --viola:#7b4f8e; --rosa:#e8a0b4; --gris:#f4f4f6; --texto:#2c2c2c; }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    body {
      min-height:100vh; display:flex; align-items:center; justify-content:center;
      background:linear-gradient(135deg,#f3e8f7 0%,#fce8ef 50%,#f0e0f8 100%);
      font-family:'DM Sans',sans-serif; padding:1rem;
    }
    body::before, body::after {
      content:''; position:fixed; border-radius:50%;
      filter:blur(80px); opacity:.35; pointer-events:none; z-index:0;
    }
    body::before {
      width:420px; height:420px;
      background:radial-gradient(circle,var(--viola) 0%,transparent 70%);
      top:-100px; left:-100px;
    }
    body::after {
      width:380px; height:380px;
      background:radial-gradient(circle,var(--rosa) 0%,transparent 70%);
      bottom:-80px; right:-80px;
    }
    .card {
      position:relative; z-index:1; background:#fff; border-radius:24px;
      box-shadow:0 8px 40px rgba(123,79,142,.18);
      max-width:360px; width:100%; overflow:hidden;
      animation:slideUp .5s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes slideUp {
      from { opacity:0; transform:translateY(28px) scale(.97); }
      to   { opacity:1; transform:translateY(0) scale(1); }
    }
    .card-header {
      background:linear-gradient(135deg,#7b4f8e 0%,#a06fa0 60%,#c8a0c8 100%);
      padding:28px 24px 22px;
      display:flex; flex-direction:column; align-items:center; gap:10px;
    }
    .logo-circle {
      width:80px; height:80px; border-radius:50%; overflow:hidden;
      border:3px solid rgba(255,255,255,.5);
      box-shadow:0 4px 16px rgba(0,0,0,.2);
    }
    .logo-circle img { width:100%; height:100%; object-fit:cover; display:block; }
    .card-header h1 {
      color:#fff; font-family:'Playfair Display',serif;
      font-size:1.3rem; letter-spacing:2px;
    }
    .card-header p { color:rgba(255,255,255,.88); font-size:.82rem; }
    .card-body { padding:28px 28px 12px; text-align:center; }
    .card-body h2 {
      font-family:'Playfair Display',serif;
      font-size:1.2rem; color:var(--texto); line-height:1.4; margin-bottom:10px;
    }
    .card-body p { font-size:.875rem; color:#666; line-height:1.6; }
    .emojis { margin-top:8px; font-size:1.2rem; letter-spacing:4px; }
    .divider { height:1px; background:var(--gris); margin:20px 28px 0; }
    .card-actions { padding:18px 28px 24px; }
    .btn-entrar {
      width:100%; border:none; border-radius:12px; padding:14px;
      font-family:'DM Sans',sans-serif; font-size:.95rem; font-weight:500;
      cursor:pointer; transition:all .18s ease;
      background:linear-gradient(135deg,#7b4f8e,#c8a0c8);
      color:#fff; box-shadow:0 4px 16px rgba(123,79,142,.35);
      display:flex; align-items:center; justify-content:center; gap:8px;
    }
    .btn-entrar:hover { opacity:.9; transform:translateY(-2px); }
    .btn-entrar:active { transform:scale(.98); }
    .btn-directo {
      display:flex; align-items:center; justify-content:center; gap:8px;
      width:100%; text-decoration:none; border-radius:12px; padding:14px;
      background:linear-gradient(135deg,#7b4f8e,#c8a0c8);
      color:#fff; font-family:'DM Sans',sans-serif;
      font-size:.95rem; font-weight:500;
      box-shadow:0 4px 16px rgba(123,79,142,.35);
      transition:all .18s ease; margin-top:0;
    }
    .btn-directo:hover { opacity:.9; transform:translateY(-2px); }
    .maia-brand {
      text-align:center; padding:0 0 18px;
      font-size:.72rem; color:#bbb; letter-spacing:.8px; text-transform:uppercase;
    }
    .maia-brand span { color:var(--viola); font-weight:500; }
    .nota {
      text-align:center; padding:0 28px 14px;
      font-size:.75rem; color:#bbb; line-height:1.5;
    }
  </style>
</head>
<body>
<div class="card" id="card">

  <div class="card-header">
    <div class="logo-circle">
      <img src="https://i.postimg.cc/8zL8DB99/MAIA.jpg" alt="MAIA"
           onerror="this.style.display='none'"/>
    </div>
    <h1>MAIA_for you</h1>
    <p>Boutique Flores y Globos 🌸</p>
  </div>

  <div class="card-body" id="card-body">
    <h2>¡Bienvenida a nuestra tienda!</h2>
    <p>Explora nuestra colección de arreglos florales,<br>
       ramos personalizados y globos para cada ocasión.</p>
    <p class="emojis">🌷 💐 🎈</p>
  </div>

  <div class="divider"></div>

  <div class="card-actions" id="card-actions">
    <button class="btn-entrar" onclick="entrar()">
      🌸 &nbsp;Entrar a la tienda
    </button>
  </div>

  <p class="nota" id="nota">Se abrirá en una nueva pestaña</p>

  <div class="maia-brand">Tienda <span>MAIA</span> &nbsp;|&nbsp; 55 7924 8882</div>

</div>

<script>
  var TIENDA = 'https://script.google.com/macros/s/AKfycbybiU5TTvMDNedUC9gev5gh7mmWbZdqGSelDU_gLdypgXr9d5k6olPo1mhCUGqXdcMV/exec';

  function entrar() {
    // Abrir en nueva pestaña — evita el bloqueo de Google al venir de GitHub
    var ventana = window.open(TIENDA, '_blank');

    // Si el navegador bloqueó el popup, mostrar botón manual con link directo
    if (!ventana || ventana.closed || typeof ventana.closed === 'undefined') {
      document.getElementById('nota').textContent = '';
      document.getElementById('card-actions').innerHTML =
        '<a href="' + TIENDA + '" target="_blank" class="btn-directo">🌸 &nbsp;Abrir tienda</a>';
    }
  }
</script>
</body>
</html>
